# This workflow warns and then closes issues and PRs that have had no activity for a specified amount of time.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/actions/stale
name: "Close stale issues"
on:
  schedule:
  - cron: "0 23 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/stale@v8
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        stale-issue-message: 'This issue is stale because it has been open for 60 days without activity. Remove the stale label or comment on this issue otherwise this issue will be auto-closed in 7 days.'
        stale-pr-message: 'This PR is stale because it has been open for 60 days without activity. Remove the stale label or comment on this issue otherwise this issue will be auto-closed in 7 days.'
        exempt-issue-labels: triaged
        stale-pr-label: 'no-pr-activity'
